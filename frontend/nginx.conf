server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy → backend container ────────────────────────────────────────
    # All /api/* and /auth/* requests are forwarded to the Node backend.
    # The backend is not exposed to the host — only reachable within Docker.
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Pass cookies both ways so session auth works end-to-end
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;
        proxy_read_timeout 60s;
    }

    location /auth/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_pass_header  Set-Cookie;
    }

    # ── SPA catch-all ─────────────────────────────────────────────────────────
    # React Router handles client-side navigation — unknown paths serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Performance: cache static assets ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
