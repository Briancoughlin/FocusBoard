server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP: React uses inline scripts/styles; restrict everything else to self
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:;" always;

    # ── API proxy → backend container ────────────────────────────────────────
    # All /api/* and /auth/* requests are forwarded to the Node backend.
    # The backend is not exposed to the host — only reachable within Docker.
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Pass cookies both ways so session auth works end-to-end
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;
        proxy_read_timeout 60s;
    }

    location /auth/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_pass_header  Set-Cookie;
    }

    # ── SPA catch-all ─────────────────────────────────────────────────────────
    # React Router handles client-side navigation — unknown paths serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Performance: cache static assets ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
